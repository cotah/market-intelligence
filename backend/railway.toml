# Configuracao de deploy do backend no Railway.
# Usamos um Dockerfile proprio (backend/Dockerfile) em vez do Nixpacks, para
# ter controle total do build e fixar o uv. Vale para o servico WEB (a API).
# Os servicos worker e beat usam o mesmo repo/imagem, mas com Start Command
# proprio no Railway (veja README -> Deploy).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# O comando de start do web vem do CMD do Dockerfile (migrations + uvicorn).
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
